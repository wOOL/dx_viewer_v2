<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>DentaView — Radiograph + Notes</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<div class="app">
			<header class="topbar">
				<div class="topbar-brand">
					<div class="topbar-logo">D</div>
					<span class="topbar-title">DentaView</span>
				</div>
				<div class="topbar-meta">
					<span class="topbar-badge"><span class="topbar-dot"></span> Connected</span>
					<span>Patient #10482</span>
					<span>Dr. Sarah Chen</span>
				</div>
			</header>

			<main class="main main--sidebar">
				<div class="panel">
					<div class="panel-header">
						<span class="panel-title">Radiograph Viewer</span>
						<div class="panel-actions">
							<button class="btn">↻ Reset</button>
							<button class="btn">⊞ Full Screen</button>
						</div>
					</div>
					<div class="viewer">
						<img id="xray-image" alt="Panoramic radiograph" src="./test-image.jpg" />
					</div>
				</div>

				<div class="sidebar">
					<div class="sidebar-section">
						<dl>
							<div class="info-row">
								<dt>Patient</dt>
								<dd>James Morrison</dd>
							</div>
							<div class="info-row">
								<dt>DOB</dt>
								<dd>1987-04-12</dd>
							</div>
							<div class="info-row">
								<dt>Acquired</dt>
								<dd>2026-03-04</dd>
							</div>
						</dl>
					</div>

					<div class="sidebar-section">
						<label class="sidebar-label" for="notes">Clinical Notes</label>
						<textarea id="notes" placeholder="AI analysis results will appear here…"></textarea>
					</div>
				</div>
			</main>

			<footer class="statusbar">
				<div class="statusbar-group">
					<span>DentaView v3.2.1</span>
					<span>Test PMS — Image + Notes</span>
				</div>
				<div class="statusbar-group">
					<span>Image + Notes</span>
				</div>
			</footer>
		</div>
	</body>
</html>
