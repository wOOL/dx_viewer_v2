name: Build & deploy dx-viewer SPA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Headroom for the added browser download + unit-test gate (was 10 when the
    # job was install→build→rsync only).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin the bun that generated the committed text bun.lock. Without this,
          # setup-bun reads packageManager from package.json and pulled bun 1.1.1,
          # which predates the text lockfile format and fails --frozen-lockfile with
          # "lockfile had changes, but lockfile is frozen". Keep in sync with the
          # packageManager field.
          bun-version: 1.3.11

      - name: Install dependencies
        # Text bun.lock is committed (bun 1.3.x format), so installs are reproducible.
        run: bun install --frozen-lockfile

      # (paraglide generation step removed: the app uses svelte-i18n with
      #  committed JSON catalogs — nothing to generate.)

      - name: Install Playwright Chromium
        # The vitest "client" project runs component tests in a real Chromium via
        # the Playwright provider — the runner image doesn't ship that browser.
        run: cd apps/dx-viewer && bunx playwright install --with-deps chromium

      - name: Unit tests
        # Pre-deploy gate: 84 files / 985 tests (node + browser projects). A red
        # suite must never reach the rsync step. E2E stays local-only (needs the
        # demo account + machine-local fixtures).
        run: bun run test:dx-viewer

      - name: Build
        run: bun run build:dx-viewer
        env:
          # The app reads VITE_PB_URL (falls back to prod pbapi.becertain.ai when
          # unset). Reuses the existing VITE_POCKETBASE_URL repo secret — same
          # value, app-side name changed with the new frontend.
          VITE_PB_URL: ${{ secrets.VITE_POCKETBASE_URL }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "${{ secrets.SSH_HOST }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o UserKnownHostsFile=~/.ssh/known_hosts" \
            apps/dx-viewer/build/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/dx-viewer-v2/"
